<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="img/images.jpg" alt="Logo"> 
                <span>
                    DigiTall 
                </span>
        </div>
        <div class="inicio">
            <button class="btn">Iniciar Sesión</button> 
        </div>
        <nav class="nav">
            <div class="enlaces">
                <a href="#">Inicio</a>
                <a href="#">Servicios</a>
                <a href="#">Nosotros</a>
                <a href="#">Contacto</a>
                <a href="#">Blog</a>
            </div>
        </nav>
    </header>
    <main>
        <section class="banner">
            <h1>Bebidas electronicas</h1>
            <p>Una coca cola bien fria que nunca se acaba porque es INFINITA.</p>
            <button class="btn">comprar ahora</button>
            <img src="img/banner.jpg" alt="Banner">
            <div class="etiqueta">
                <span><b>¡30% OFF!</b></span>
            </div>
        </section>
        <div class="Producto-mas-vendido">
            <article>
                <h2>Producto más vendido</h2>
                <img src="img/producto.jpg" alt="Producto">
                <p>Descripción del producto</p>
                <p class="precio">$19.99</p>
                <button class="btnPrecio">Ver producto</button>
            </article>
             
        </div>
    </main>

</html>
